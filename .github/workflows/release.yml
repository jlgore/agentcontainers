name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  id-token: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: sigstore/cosign-installer@v3

      - uses: goreleaser/goreleaser-action@v7
        id: goreleaser
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate subject hashes
        id: hash
        run: |
          set -euo pipefail
          # goreleaser v2 writes checksums.txt with "sha256:hash  filename" lines
          hashes=$(cat dist/checksums.txt | base64 -w0)
          echo "hashes=$hashes" >> "$GITHUB_OUTPUT"

  provenance:
    needs: goreleaser
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: ${{ needs.goreleaser.outputs.hashes }}
      upload-assets: true

  # Build the applevm microVM kernel (BPF-LSM + BTF) and attach it to the
  # release as `vmlinux`, so `gh release download --pattern vmlinux` works for
  # the applevm setup (see applevm/ac-applevmd/README.md).
  applevm-kernel:
    uses: ./.github/workflows/applevm-kernel.yml

  applevm-kernel-release:
    needs: [goreleaser, applevm-kernel]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ac-applevm-vmlinux
      - name: Attach kernel to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF_NAME}" vmlinux --clobber --repo "${GITHUB_REPOSITORY}"
